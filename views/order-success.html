<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Placed! — Velvet Beauty</title>
  <link rel="stylesheet" href="../public/css/variables.css"/>
  <link rel="stylesheet" href="../public/css/main.css"/>
  <link rel="stylesheet" href="../public/css/checkout.css"/>
</head>
<body>
<div id="toast-container"></div>

<nav class="navbar solid" id="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">
        <svg class="logo-svg" viewBox="0 0 38 38" fill="none"><circle cx="19" cy="19" r="18" fill="#4A1A40"/><ellipse cx="19" cy="14" rx="5" ry="7" fill="#E91E8C"/><ellipse cx="19" cy="14" rx="3" ry="5" fill="#F472B6"/><rect x="16" y="20" width="6" height="10" rx="3" fill="#C9956C"/><circle cx="19" cy="29" r="2" fill="#E91E8C"/></svg>
        <div class="logo-text"><span class="logo-name">Velvet Beauty</span><span class="logo-tag">Luxury Cosmetics</span></div>
      </a>
      <div class="navbar-actions">
        <a href="cart.html" class="nav-icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="nav-badge" id="cart-count" style="display:none">0</span>
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="success-page">
  <div class="success-card">
    <div class="success-animation">🎉</div>
    <h1 class="success-title">Order Placed!</h1>
    <p class="success-sub">Thank you for your order. We'll get it packed and shipped soon!</p>

    <div class="success-order-num">
      📦 Order #<span id="success-order-id">VB-00000</span>
    </div>

    <!-- Items summary -->
    <div class="success-items" id="success-items"></div>

    <!-- Total -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding:0.75rem 1rem;background:var(--pink-ultra);border-radius:var(--r-lg);border:1px solid var(--pink-pale);">
      <span style="font-weight:600;color:var(--plum-dark);">Total Paid</span>
      <span style="font-family:var(--font-display);font-size:1.5rem;color:var(--pink);font-weight:500;" id="success-total">Rs. 0</span>
    </div>

    <!-- Delivery info -->
    <div style="padding:0.75rem 1rem;background:var(--success-bg);border-radius:var(--r-md);margin-bottom:1.5rem;font-size:0.82rem;color:var(--success);text-align:left;">
      🚚 Expected delivery: <strong id="success-delivery-days">3–5 business days</strong>
    </div>

    <div class="success-btns">
      <a href="shop.html" class="btn btn-primary btn-lg">Continue Shopping</a>
      <a href="index.html" class="btn btn-outline btn-lg">Back to Home</a>
    </div>
  </div>
</div>

<script src="../public/js/store.js"></script>
<script>
  // Show last order details
  document.addEventListener('DOMContentLoaded', () => {
    initNav();
    VBCart.updateBadge();
    VBWish.updateBadge();

    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');
    if (!orderId) { window.location.href = 'index.html'; return; }

    const order = VBOrders.getById(orderId);
    if (!order) { window.location.href = 'index.html'; return; }

    document.getElementById('success-order-id').textContent = orderId;
    document.getElementById('success-total').textContent = 'Rs. ' + order.total.toLocaleString();

    // Delivery days
    const days = { standard:'3–5 business days', express:'1–2 business days', sameday:'Today!' };
    document.getElementById('success-delivery-days').textContent = days[order.deliveryType] || '3–5 business days';

    // Items
    const itemsEl = document.getElementById('success-items');
    if (order.items && order.items.length) {
      itemsEl.innerHTML = order.items.map(item => `
        <div class="success-item">
          <div class="si-img">
            <img src="${item.image || 'https://placehold.co/48x48/FDE8F3/E91E8C?text=VB'}" alt="${item.name}" onerror="this.src='https://placehold.co/48x48/FDE8F3/E91E8C?text=VB'"/>
          </div>
          <div>
            <div class="si-name">${item.name}</div>
            <div class="si-qty">Qty: ${item.qty}</div>
          </div>
          <div class="si-price">Rs. ${(item.price * item.qty).toLocaleString()}</div>
        </div>
      `).join('');
    }
  });
</script>
</body>
</html>
