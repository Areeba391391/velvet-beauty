<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Placed! — Velvet Beauty</title>
  <link rel="stylesheet" href="../public/css/variables.css" />
  <link rel="stylesheet" href="../public/css/main.css" />
  <link rel="stylesheet" href="../public/css/checkout.css" />
</head>
<body class="page-body">

  <nav class="navbar">
    <div class="container">
      <div class="navbar-inner">
        <a href="index.html" class="navbar-logo">
          <svg class="navbar-logo-svg" viewBox="0 0 38 38" fill="none">
            <circle cx="19" cy="19" r="18" fill="#4A1A40"/>
            <ellipse cx="19" cy="14" rx="5" ry="7" fill="#E91E8C"/>
            <ellipse cx="19" cy="14" rx="3" ry="5" fill="#F472B6"/>
            <rect x="16" y="20" width="6" height="10" rx="3" fill="#C9956C"/>
            <circle cx="19" cy="29" r="2" fill="#E91E8C"/>
          </svg>
          <div class="navbar-logo-text">
            <span class="brand-name">Velvet Beauty</span>
            <span class="brand-tagline">Luxury Cosmetics</span>
          </div>
        </a>
      </div>
    </div>
  </nav>

  <div class="success-page">
    <div class="success-card">
      <div class="success-icon">✅</div>
      <h1 class="success-title">Order Placed!</h1>
      <p class="success-subtitle" id="success-msg">
        Thank you for your order. We'll deliver it to you soon!
      </p>

      <div class="order-number-badge" id="order-num-badge">
        📦 Order #VB-000000
      </div>

      <!-- Order summary preview -->
      <div id="success-order-summary" style="text-align:left; margin-bottom:2rem;"></div>

      <div style="display:flex; flex-direction:column; gap:1rem;">
        <a href="shop.html" class="btn btn-primary btn-lg">Continue Shopping</a>
        <a href="index.html" class="btn btn-ghost">Back to Home</a>
      </div>
    </div>
  </div>

  <script src="../public/js/cart.js"></script>
  <script>
    /* Show order details from sessionStorage set by checkout.js */
    document.addEventListener('DOMContentLoaded', () => {
      const order = JSON.parse(sessionStorage.getItem('lastOrder') || '{}');
      if (order.orderNumber) {
        document.getElementById('order-num-badge').textContent = `📦 Order #${order.orderNumber}`;
        document.getElementById('success-msg').textContent =
          `Hi ${order.customerName || 'there'}! Your order has been placed. Expected delivery: 3-5 business days.`;
      }
      // Clear cart after successful order
      localStorage.removeItem('vb_cart');
    });
  </script>
</body>
</html>
