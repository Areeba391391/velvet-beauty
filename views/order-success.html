<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — Velvet Beauty</title>
  <link rel="stylesheet" href="../public/css/variables.css">
  <link rel="stylesheet" href="../public/css/main.css">
  <style>
    body { background: #faf7f5; }
    .navbar-dark-solid { background: #0D0008 !important; padding: 18px 0 !important; }
    .success-page { min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 120px 20px 80px; }
    .success-card {
      background: #fff; border-radius: 28px; padding: 60px 48px;
      text-align: center; max-width: 560px; width: 100%;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    }
    .success-icon-wrap {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg, #d4edda, #a8ddb5);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px; font-size: 42px;
    }
    .success-eyebrow { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; color: #2D8A4E; margin-bottom: 12px; display: block; }
    .success-title { font-family: var(--font-h); font-size: 42px; font-weight: 300; color: #111; margin-bottom: 12px; line-height: 1.1; }
    .success-title em { color: var(--p-pink); font-style: italic; }
    .success-sub  { font-size: 15px; color: #888; margin-bottom: 32px; line-height: 1.8; }
    .order-id-box {
      background: #f8f8f8; border-radius: 14px; padding: 16px 24px;
      margin-bottom: 32px; font-size: 13px; color: #666;
    }
    .order-id-box strong { color: #111; font-size: 18px; display: block; margin-top: 4px; font-family: var(--font-h); }
    .success-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .delivery-info { display: flex; gap: 24px; justify-content: center; margin-bottom: 32px; }
    .del-item { text-align: center; }
    .del-item .del-icon { font-size: 28px; margin-bottom: 6px; }
    .del-item .del-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1.5px; }
    .del-item .del-val { font-size: 13px; font-weight: 700; color: #111; margin-top: 2px; }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 28px 0; }
  </style>
</head>
<body>
<div id="toast-container"></div>

<nav class="navbar navbar-dark-solid" id="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="logo">Velvet<span>.</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="nav-cart-link">
        Cart <span class="cart-count-pill" id="cart-count" style="display:none">0</span>
      </a>
      <div class="nav-dropdown-wrap">
        <button id="account-btn"></button>
        <div id="user-dropdown"></div>
      </div>
    </div>
  </div>
</nav>

<div class="success-page">
  <div class="success-card">
    <div class="success-icon-wrap">✅</div>
    <span class="success-eyebrow">Order Confirmed</span>
    <h1 class="success-title">Thank <em>You!</em></h1>
    <p class="success-sub">Your order has been placed successfully. We'll prepare your luxury cosmetics with care and ship them to you soon.</p>

    <div class="order-id-box">
      Order ID
      <strong id="order-id-display">VB-10009</strong>
    </div>

    <div class="delivery-info">
      <div class="del-item">
        <div class="del-icon">📦</div>
        <div class="del-label">Status</div>
        <div class="del-val">Processing</div>
      </div>
      <div class="del-item">
        <div class="del-icon">🚚</div>
        <div class="del-label">Delivery</div>
        <div class="del-val">3–5 Days</div>
      </div>
      <div class="del-item">
        <div class="del-icon">💳</div>
        <div class="del-label">Payment</div>
        <div class="del-val" id="payment-display">COD</div>
      </div>
    </div>

    <hr class="divider">

    <div class="success-actions">
      <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
      <a href="index.html" class="btn btn-ghost">Back to Home</a>
    </div>
  </div>
</div>

<script src="../public/js/store.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("id");
  if (orderId) {
    document.getElementById("order-id-display").textContent = orderId;
    const order = VBOrders.getById(orderId);
    if (order && order.paymentMethod) {
      const pmMap = { cod:"Cash on Delivery", easypaisa:"EasyPaisa", jazzcash:"JazzCash", bank:"Bank Transfer" };
      document.getElementById("payment-display").textContent = pmMap[order.paymentMethod] || order.paymentMethod;
    }
  }
});
</script>
</body>
</html>
